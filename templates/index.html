<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RMM Viewer - Dual Channel</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        background-color: black;
        cursor: default;
      }

      .status {
        position: fixed;
        left: 10px;
        bottom: 10px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
        z-index: 1000;
      }

      .layout-indicator {
        position: fixed;
        right: 10px;
        bottom: 10px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
        padding: 2px 5px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 3px;
        z-index: 1000;
      }

      .channel-status {
        position: fixed;
        left: 10px;
        top: 10px;
        color: #0f0;
        font-family: monospace;
        font-size: 10px;
        background: rgba(0, 0, 0, 0.7);
        padding: 5px;
        border-radius: 3px;
        z-index: 1000;
      }

      .controls {
        position: fixed;
        right: 10px;
        top: 10px;
        z-index: 1000;
      }

      .btn {
        background: rgba(0, 128, 0, 0.8);
        color: white;
        border: none;
        padding: 5px 10px;
        margin: 2px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 10px;
        font-family: monospace;
      }

      .btn:hover {
        background: rgba(0, 180, 0, 0.9);
      }

      .btn:disabled {
        background: rgba(128, 128, 128, 0.5);
        cursor: not-allowed;
      }

      .screenshot-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }

      .screenshot-content {
        max-width: 90%;
        max-height: 90%;
        border: 2px solid #0f0;
        border-radius: 5px;
      }

      .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: #f00;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay playsinline muted></video>

    <div id="status" class="status">Connecting...</div>
    <div id="layoutIndicator" class="layout-indicator">EN</div>

    <div class="channel-status">
      <div>Control: <span id="controlStatus">Disconnected</span></div>
      <div>Binary: <span id="binaryStatus">Disconnected</span></div>
      <div>Video: <span id="videoStatus">Waiting</span></div>
    </div>

    <div class="controls">
      <button id="screenshotBtn" class="btn" disabled>Screenshot (F9)</button>
      <button id="statsBtn" class="btn">Stats</button>
    </div>

    <!-- Screenshot Modal -->
    <div id="screenshotModal" class="screenshot-modal">
      <button class="close-btn" onclick="closeScreenshot()">Close (ESC)</button>
      <img id="screenshotImg" class="screenshot-content" />
    </div>

    <script>
      // WebRTC PeerConnection и WebSocket для сигнализации
      let pc, ws;

      // ДВА РАЗНЫХ DataChannel внутри WebRTC соединения:
      // 1. controlChannel - для передачи JSON сообщений (команды мыши/клавиатуры, запросы информации)
      // 2. binaryChannel - для передачи BLOB данных (скриншоты, файлы)
      let controlChannel, binaryChannel;

      let remoteScreenWidth = 0;
      let remoteScreenHeight = 0;
      let currentWindow = { x: 0, y: 0, width: 0, height: 0, title: "" };
      let lastMouseMove = 0;
      let windowInfoRequestPending = false;
      const WINDOW_INFO_INTERVAL = 200;
      const mouseMoveThrottle = 16; // ms, ~60fps
      let currentLayout = "en"; // 'en' или 'ru'
      let screenshotCounter = 0;

      // Status Elements
      const statusEl = document.getElementById("status");
      const controlStatusEl = document.getElementById("controlStatus");
      const binaryStatusEl = document.getElementById("binaryStatus");
      const videoStatusEl = document.getElementById("videoStatus");
      const layoutIndicator = document.getElementById("layoutIndicator");
      const video = document.getElementById("video");
      const screenshotBtn = document.getElementById("screenshotBtn");
      const screenshotModal = document.getElementById("screenshotModal");
      const screenshotImg = document.getElementById("screenshotImg");

      // Кириллица -> латинские клавиши (для русской раскладки)
      const cyrillicToLatinMap = {
        й: "q",
        ц: "w",
        у: "e",
        к: "r",
        е: "t",
        н: "y",
        г: "u",
        ш: "i",
        щ: "o",
        з: "p",
        х: "[",
        ъ: "]",
        ф: "a",
        ы: "s",
        в: "d",
        а: "f",
        п: "g",
        р: "h",
        о: "j",
        л: "k",
        д: "l",
        ж: ";",
        э: "'",
        я: "z",
        ч: "x",
        с: "c",
        м: "v",
        и: "b",
        т: "n",
        ь: "m",
        б: ",",
        ю: ".",
        "/": "/",
        ё: "`",
        Ё: "~",
      };

      // Блокируем контекстное меню
      document.addEventListener("contextmenu", (e) => e.preventDefault());

      // --- Helper Functions ---
      function setStatus(msg, color = "#0f0") {
        statusEl.textContent = msg;
        statusEl.style.color = color;
      }

      function setChannelStatus(channel, status, color = "#0f0") {
        const el =
          channel === "control"
            ? controlStatusEl
            : channel === "binary"
              ? binaryStatusEl
              : videoStatusEl;
        el.textContent = status;
        el.style.color = color;
      }

      function updateLayoutIndicator() {
        layoutIndicator.textContent = currentLayout === "ru" ? "RU" : "EN";
      }

      // ОТПРАВКА JSON СООБЩЕНИЙ через controlChannel (DataChannel внутри WebRTC)
      // Используется для: команд мыши/клавиатуры, запросов информации экрана/окон
      function sendControl(type, payload = {}) {
        if (controlChannel && controlChannel.readyState === "open") {
          try {
            const message = { type, ...payload };
            // JSON сообщение отправляется как ТЕКСТ через control DataChannel
            controlChannel.send(JSON.stringify(message));
          } catch (e) {
            console.error("Failed to send control message:", e);
          }
        }
      }

      // ОТПРАВКА BLOB ДАННЫХ через binaryChannel (DataChannel внутри WebRTC)
      // Используется для: запросов скриншотов, передачи файлов
      function sendBinary(messageType, payload = new Uint8Array()) {
        if (binaryChannel && binaryChannel.readyState === "open") {
          try {
            // Формируем бинарный пакет: 4 байта тип + данные
            const typeBytes = new TextEncoder().encode(
              messageType.padEnd(4).slice(0, 4),
            );
            const message = new Uint8Array(typeBytes.length + payload.length);
            message.set(typeBytes, 0);
            message.set(payload, typeBytes.length);
            // Бинарное сообщение отправляется как ArrayBuffer через binary DataChannel
            binaryChannel.send(message);
          } catch (e) {
            console.error("Failed to send binary message:", e);
          }
        }
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function isPrintableKey(e) {
        return (
          e.key.length === 1 &&
          !e.ctrlKey &&
          !e.altKey &&
          !e.metaKey &&
          e.key !== " " // Пробел — специальная клавиша
        );
      }

      function mapKeyEventToRobotKey(e) {
        const tagName = e.target.tagName;
        if (
          tagName === "INPUT" ||
          tagName === "TEXTAREA" ||
          e.target.isContentEditable
        ) {
          return null;
        }

        const code = e.code || "";

        if (e.code === "Space") return "space";

        const keyMap = {
          Enter: "enter",
          Backspace: "backspace",
          Tab: "tab",
          Escape: "esc",
          Delete: "delete",
          Insert: "insert",
          Home: "home",
          End: "end",
          PageUp: "pageup",
          PageDown: "pagedown",
          ArrowLeft: "left",
          ArrowRight: "right",
          ArrowUp: "up",
          ArrowDown: "down",
          ControlLeft: "ctrl",
          ControlRight: "ctrl",
          ShiftLeft: "shift",
          ShiftRight: "shift",
          AltLeft: "alt",
          AltRight: "alt",
          MetaLeft: navigator.platform.startsWith("Mac") ? "command" : "win",
          MetaRight: navigator.platform.startsWith("Mac") ? "command" : "win",
          CapsLock: "capslock",
          NumLock: "numlock",
          ScrollLock: "scrolllock",
          F1: "f1",
          F2: "f2",
          F3: "f3",
          F4: "f4",
          F5: "f5",
          F6: "f6",
          F7: "f7",
          F8: "f8",
          F9: "f9",
          F10: "f10",
          F11: "f11",
          F12: "f12",
          Numpad0: "0",
          Numpad1: "1",
          Numpad2: "2",
          Numpad3: "3",
          Numpad4: "4",
          Numpad5: "5",
          Numpad6: "6",
          Numpad7: "7",
          Numpad8: "8",
          Numpad9: "9",
          NumpadDecimal: "period",
          NumpadAdd: "add",
          NumpadSubtract: "minus",
          NumpadMultiply: "multiply",
          NumpadDivide: "divide",
          NumpadEnter: "enter",
          BracketLeft: "[",
          BracketRight: "]",
          Semicolon: ";",
          Quote: "'",
          Comma: ",",
          Period: ".",
          Slash: "/",
          Backslash: "\\",
          Equal: "=",
          Minus: "-",
          Backquote: "`",
        };

        return keyMap[code] || null;
      }

      // --- WebSocket and WebRTC Connection ---
      async function connect() {
        // Создаем WebSocket соединение для сигнализации WebRTC (НЕ для передачи данных!)
        const addr =
          "ws://" + window.location.hostname + ":8000/ws/viewer/agent1";
        ws = new WebSocket(addr);

        ws.onopen = async () => {
          console.log("WebSocket connected to", addr);
          setStatus("Connected");

          if (pc) pc.close();

          // Создаем WebRTC соединение
          pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
          });

          // СОЗДАНИЕ ДВУХ DataChannel внутри WebRTC соединения:
          // 1. "control" - для JSON сообщений (ordered=true для надежности)
          controlChannel = pc.createDataChannel("control", { ordered: true });
          // 2. "binary" - для BLOB данных (ordered=true для корректной передачи файлов)
          binaryChannel = pc.createDataChannel("binary", { ordered: true });

          // Настраиваем обработчики для каждого канала
          setupControlChannel(controlChannel);
          setupBinaryChannel(binaryChannel);
          setupPeerConnection(pc);

          try {
            // Создаем SDP offer и отправляем через WebSocket для сигнализации
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify(offer));
          } catch (err) {
            console.error("Error creating or sending offer:", err);
            setStatus("WebRTC Error", "#f00");
            pc.close();
            ws.close();
          }
        };

        ws.onmessage = async (e) => {
          try {
            // Получаем сигнальные сообщения (SDP answer, ICE candidates)
            const data = JSON.parse(e.data);
            if (data.type === "answer") {
              await pc.setRemoteDescription(data);
            } else if (data.candidate) {
              await pc.addIceCandidate(data);
            }
          } catch (err) {
            console.error("Error parsing or handling WebSocket message:", err);
          }
        };

        ws.onclose = () => {
          console.warn("WebSocket disconnected. Retrying in 2 seconds...");
          setStatus("Reconnecting...", "#f90");
          setChannelStatus("control", "Disconnected", "#f90");
          setChannelStatus("binary", "Disconnected", "#f90");
          setChannelStatus("video", "Disconnected", "#f90");
          if (pc) pc.close();
          setTimeout(connect, 2000);
        };

        ws.onerror = (err) => {
          console.error("WebSocket error:", err);
          setStatus("WS Error", "#f00");
          ws.close();
        };
      }

      // НАСТРОЙКА controlChannel - для передачи JSON команд и получения ответов
      function setupControlChannel(channel) {
        channel.onopen = () => {
          setStatus("Control Ready");
          setChannelStatus("control", "Connected", "#0f0");
          screenshotBtn.disabled = false;
          console.log("Control DataChannel opened");
          // Сразу запрашиваем информацию об экране через JSON сообщение
          sendControl("request_screen_info");
        };

        // ПОЛУЧЕНИЕ JSON СООБЩЕНИЙ от Go-агента через controlChannel
        channel.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            handleControlMessage(data);
          } catch (err) {
            console.warn("Failed to parse control message:", err, e.data);
          }
        };

        channel.onclose = () => {
          setChannelStatus("control", "Disconnected", "#f66");
          screenshotBtn.disabled = true;
          console.log("Control DataChannel closed");
        };

        channel.onerror = (e) => {
          console.error("Control DataChannel error:", e);
          setChannelStatus("control", "Error", "#f00");
        };
      }

      // НАСТРОЙКА binaryChannel - для передачи BLOB данных (скриншоты, файлы)
      function setupBinaryChannel(channel) {
        // Устанавливаем тип данных как ArrayBuffer для бинарных данных
        channel.binaryType = "arraybuffer";

        channel.onopen = () => {
          setChannelStatus("binary", "Connected", "#0f0");
          console.log("Binary DataChannel opened");
        };

        // ПОЛУЧЕНИЕ BLOB ДАННЫХ от Go-агента через binaryChannel
        channel.onmessage = (e) => {
          handleBinaryMessage(e.data);
        };

        channel.onclose = () => {
          setChannelStatus("binary", "Disconnected", "#f66");
          console.log("Binary DataChannel closed");
        };

        channel.onerror = (e) => {
          console.error("Binary DataChannel error:", e);
          setChannelStatus("binary", "Error", "#f00");
        };
      }

      function setupPeerConnection(pcInstance) {
        // Получение видеопотока через WebRTC (отдельно от DataChannels)
        pcInstance.ontrack = (e) => {
          if (video.srcObject !== e.streams[0]) {
            video.srcObject = e.streams[0];
            setChannelStatus("video", "Streaming", "#0f0");
            console.log("Received remote video stream");
          }
        };

        pcInstance.onicecandidate = (e) => {
          if (e.candidate) {
            // Отправляем ICE candidates через WebSocket для сигнализации
            ws.send(JSON.stringify(e.candidate));
          }
        };

        pcInstance.onconnectionstatechange = () => {
          console.log("Peer Connection State:", pcInstance.connectionState);
          const state = pcInstance.connectionState;

          if (state === "connected") {
            setStatus("Full Connected", "#0f0");
          } else if (state === "failed" || state === "closed") {
            setStatus("Connection Lost", "#f00");
            setChannelStatus("video", "Disconnected", "#f00");
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.close();
            }
          } else if (state === "connecting") {
            setStatus("Connecting...", "#ff0");
          }
        };

        // Настраиваем прием только видео (без аудио)
        pcInstance.addTransceiver("video", { direction: "recvonly" });
      }

      // ОБРАБОТКА JSON СООБЩЕНИЙ полученных через controlChannel
      function handleControlMessage(data) {
        switch (data.type) {
          case "screen_info":
            // Получили информацию о размерах экрана от Go-агента
            remoteScreenWidth = data.width;
            remoteScreenHeight = data.height;
            console.log(
              "Received Screen Info:",
              remoteScreenWidth,
              "x",
              remoteScreenHeight,
            );
            syncVideoDimensions();
            break;

          case "window_info":
            // Получили информацию о текущем окне от Go-агента
            windowInfoRequestPending = false;
            currentWindow = {
              x: data.x,
              y: data.y,
              width: data.width,
              height: data.height,
              title: data.title,
            };
            console.log(
              "Received Window Info:",
              currentWindow.title,
              currentWindow.width + "x" + currentWindow.height,
            );
            break;

          default:
            console.log("Unknown control message type:", data.type);
        }
      }

      // ОБРАБОТКА BLOB ДАННЫХ полученных через binaryChannel
      function handleBinaryMessage(arrayBuffer) {
        const data = new Uint8Array(arrayBuffer);
        if (data.length < 4) {
          console.warn("Binary message too short");
          return;
        }

        // Извлекаем тип сообщения из первых 4 байт
        const msgType = String.fromCharCode(...data.slice(0, 4));
        const payload = data.slice(4);

        switch (msgType) {
          case "SCRN":
            // Получили данные скриншота в виде PNG
            handleScreenshotData(payload);
            break;
          case "FILE":
            // Получили данные файла
            handleFileData(payload);
            break;
          default:
            console.log("Unknown binary message type:", msgType);
        }
      }

      // ОБРАБОТКА BLOB ДАННЫХ СКРИНШОТА
      function handleScreenshotData(data) {
        screenshotCounter++;
        console.log(
          `Received screenshot #${screenshotCounter}, size: ${data.length} bytes`,
        );

        // Создаем Blob из полученных PNG данных
        const blob = new Blob([data], { type: "image/png" });
        const url = URL.createObjectURL(blob);

        // Отображаем скриншот в модальном окне
        screenshotImg.src = url;
        screenshotModal.style.display = "flex";

        // Auto cleanup URL after some time
        setTimeout(() => URL.revokeObjectURL(url), 30000);
      }

      function handleFileData(data) {
        console.log("Received file data:", data.length, "bytes");
        // Handle file transfers here
      }

      // --- Mouse and Video Handling ---
      function syncVideoDimensions() {
        if (video.videoWidth && video.videoHeight) {
          if (
            !remoteScreenWidth ||
            !remoteScreenHeight ||
            Math.abs(remoteScreenWidth - video.videoWidth) > 10 ||
            Math.abs(remoteScreenHeight - video.videoHeight) > 10
          ) {
            remoteScreenWidth = video.videoWidth;
            remoteScreenHeight = video.videoHeight;
            console.log(
              "Auto-synced remote dimensions:",
              remoteScreenWidth,
              "x",
              remoteScreenHeight,
            );
            sendControl("request_screen_info");
          }
        }
      }

      video.addEventListener("loadedmetadata", syncVideoDimensions);
      new ResizeObserver(syncVideoDimensions).observe(video);

      function mapPointerToRemote(clientX, clientY) {
        if (remoteScreenWidth <= 0 || remoteScreenHeight <= 0) {
          console.warn(
            "Remote screen dimensions not available for mouse mapping",
          );
          return null;
        }

        const rect = video.getBoundingClientRect();
        const videoNativeRatio = remoteScreenWidth / remoteScreenHeight;
        const videoElementRatio = rect.width / rect.height;

        let drawWidth,
          drawHeight,
          offsetX = 0,
          offsetY = 0;

        if (videoElementRatio > videoNativeRatio) {
          drawHeight = rect.height;
          drawWidth = drawHeight * videoNativeRatio;
          offsetX = (rect.width - drawWidth) / 2;
        } else {
          drawWidth = rect.width;
          drawHeight = drawWidth / videoNativeRatio;
          offsetY = (rect.height - drawHeight) / 2;
        }

        const xInVideo = clientX - rect.left - offsetX;
        const yInVideo = clientY - rect.top - offsetY;

        if (
          xInVideo < 0 ||
          xInVideo > drawWidth ||
          yInVideo < 0 ||
          yInVideo > drawHeight
        ) {
          return null;
        }

        const remoteX = Math.round(
          clamp(xInVideo / drawWidth, 0, 1) * remoteScreenWidth,
        );
        const remoteY = Math.round(
          clamp(yInVideo / drawHeight, 0, 1) * remoteScreenHeight,
        );

        return { x: remoteX, y: remoteY };
      }

      const EDGE_THRESHOLD = 10;

      function getWindowEdgeCursor(clientX, clientY) {
        if (
          currentWindow.width <= 0 ||
          currentWindow.height <= 0 ||
          remoteScreenWidth <= 0 ||
          remoteScreenHeight <= 0
        ) {
          return null;
        }

        const mapped = mapPointerToRemote(clientX, clientY);
        if (!mapped) return null;

        const winX = mapped.x - currentWindow.x;
        const winY = mapped.y - currentWindow.y;

        if (
          winX < 0 ||
          winY < 0 ||
          winX > currentWindow.width ||
          winY > currentWindow.height
        ) {
          return null;
        }

        const onTop = winY < EDGE_THRESHOLD;
        const onBottom = winY > currentWindow.height - EDGE_THRESHOLD;
        const onLeft = winX < EDGE_THRESHOLD;
        const onRight = winX > currentWindow.width - EDGE_THRESHOLD;

        if (onTop && onLeft) return "nw-resize";
        if (onTop && onRight) return "ne-resize";
        if (onBottom && onLeft) return "sw-resize";
        if (onBottom && onRight) return "se-resize";
        if (onTop || onBottom) return "ns-resize";
        if (onLeft || onRight) return "ew-resize";

        return null;
      }

      // Mouse Event Handlers
      video.addEventListener("mouseleave", () => {
        video.style.cursor = "default";
      });

      video.addEventListener("mousemove", (e) => {
        const cursor = getWindowEdgeCursor(e.clientX, e.clientY);
        video.style.cursor = cursor || "default";

        const now = Date.now();
        if (now - lastMouseMove < mouseMoveThrottle) return;
        lastMouseMove = now;

        const mapped = mapPointerToRemote(e.clientX, e.clientY);
        if (mapped) {
          // Отправляем команду перемещения мыши через controlChannel (JSON)
          sendControl("mouse_move", mapped);
        }
      });

      ["mousedown", "mouseup"].forEach((evt) =>
        video.addEventListener(evt, (e) => {
          // Отправляем команды кликов мыши через controlChannel (JSON)
          sendControl(evt === "mousedown" ? "mouse_down" : "mouse_up", {
            button: e.button,
          });
          e.preventDefault();
        }),
      );

      // Keyboard Event Handlers
      window.addEventListener("keydown", (e) => {
        if (!controlChannel || controlChannel.readyState !== "open") return;

        // F9 for screenshot
        if (e.key === "F9") {
          e.preventDefault();
          requestScreenshot();
          return;
        }

        // Escape to close screenshot
        if (e.key === "Escape" && screenshotModal.style.display === "flex") {
          closeScreenshot();
          e.preventDefault();
          return;
        }

        if (isPrintableKey(e) && e.key.length === 1) {
          let latKey = e.key;
          if (/[а-яёА-ЯЁ]/.test(latKey)) {
            latKey = cyrillicToLatinMap[latKey.toLowerCase()] || latKey;
          }
          // Отправляем команду нажатия клавиши через controlChannel (JSON)
          sendControl("key_down", { key: latKey });
          e.preventDefault();
          return;
        }

        const robotKey = mapKeyEventToRobotKey(e);
        if (robotKey) {
          e.preventDefault();
          // Отправляем команду нажатия клавиши через controlChannel (JSON)
          sendControl("key_down", { key: robotKey });
        } else {
          e.preventDefault();
        }
      });

      window.addEventListener("keyup", (e) => {
        if (!controlChannel || controlChannel.readyState !== "open") return;

        if (
          isPrintableKey(e) &&
          e.key.length === 1 &&
          /[а-яёА-ЯЁ]/.test(e.key)
        ) {
          const latKey = cyrillicToLatinMap[e.key.toLowerCase()] || e.key;
          // Отправляем команду отпускания клавиши через controlChannel (JSON)
          sendControl("key_up", { key: latKey });
          e.preventDefault();
          return;
        }

        const robotKey = mapKeyEventToRobotKey(e);
        if (robotKey) {
          e.preventDefault();
          // Отправляем команду отпускания клавиши через controlChannel (JSON)
          sendControl("key_up", { key: robotKey });
        } else {
          e.preventDefault();
        }
      });

      // Layout switching (Ctrl+Shift)
      window.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.shiftKey && !e.altKey && !e.metaKey) {
          currentLayout = currentLayout === "ru" ? "en" : "ru";
          updateLayoutIndicator();
          e.preventDefault();
        }
      });

      // --- UI Functions ---
      function requestScreenshot() {
        if (!binaryChannel || binaryChannel.readyState !== "open") {
          console.warn("Binary channel not available for screenshot");
          return;
        }

        console.log("Requesting screenshot...");
        // Отправляем запрос на скриншот через binaryChannel (BLOB данные)
        sendBinary("SCRN", new TextEncoder().encode("REQUEST"));
      }

      function closeScreenshot() {
        screenshotModal.style.display = "none";
        if (screenshotImg.src) {
          URL.revokeObjectURL(screenshotImg.src);
          screenshotImg.src = "";
        }
      }

      function showStats() {
        const stats = {
          remoteScreenWidth,
          remoteScreenHeight,
          currentWindow,
          screenshotCounter,
          controlChannelState: controlChannel?.readyState || "null",
          binaryChannelState: binaryChannel?.readyState || "null",
          videoState: video.srcObject ? "active" : "none",
        };

        alert("RMM Stats:\n" + JSON.stringify(stats, null, 2));
      }

      // Event Listeners
      screenshotBtn.addEventListener("click", requestScreenshot);
      document.getElementById("statsBtn").addEventListener("click", showStats);

      // Close screenshot on click outside
      screenshotModal.addEventListener("click", (e) => {
        if (e.target === screenshotModal) {
          closeScreenshot();
        }
      });

      // Initialize
      updateLayoutIndicator();
      connect();

      // Window info polling
      setInterval(() => {
        if (
          controlChannel &&
          controlChannel.readyState === "open" &&
          !windowInfoRequestPending
        ) {
          windowInfoRequestPending = true;
          // Запрашиваем информацию об активном окне через controlChannel (JSON)
          sendControl("request_window_info");
        }
      }, WINDOW_INFO_INTERVAL);
    </script>
  </body>
</html>

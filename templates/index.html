<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RMM Viewer v2.0 - Phase 1 Fixed</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        background-color: black;
        cursor: default;
      }

      .status {
        position: fixed;
        left: 10px;
        bottom: 10px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
        z-index: 1000;
      }

      .layout-indicator {
        position: fixed;
        right: 10px;
        bottom: 10px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
        padding: 2px 5px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 3px;
        z-index: 1000;
      }

      .channel-status {
        position: fixed;
        left: 10px;
        top: 10px;
        color: #0f0;
        font-family: monospace;
        font-size: 10px;
        background: rgba(0, 0, 0, 0.7);
        padding: 5px;
        border-radius: 3px;
        z-index: 1000;
      }

      .controls {
        position: fixed;
        right: 10px;
        top: 10px;
        z-index: 1000;
      }

      .btn {
        background: rgba(0, 128, 0, 0.8);
        color: white;
        border: none;
        padding: 5px 10px;
        margin: 2px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 10px;
        font-family: monospace;
      }

      .btn:hover {
        background: rgba(0, 180, 0, 0.9);
      }

      .btn:disabled {
        background: rgba(128, 128, 128, 0.5);
        cursor: not-allowed;
      }

      .screenshot-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }

      .screenshot-content {
        max-width: 90%;
        max-height: 90%;
        border: 2px solid #0f0;
        border-radius: 5px;
      }

      .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: #f00;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
      }

      .debug-info {
        position: fixed;
        right: 10px;
        top: 60px;
        color: #0f0;
        font-family: monospace;
        font-size: 8px;
        background: rgba(0, 0, 0, 0.8);
        padding: 8px;
        border-radius: 3px;
        z-index: 1000;
        max-width: 300px;
        border: 1px solid #333;
      }

      .version-info {
        position: fixed;
        left: 10px;
        top: 80px;
        color: #666;
        font-family: monospace;
        font-size: 8px;
        z-index: 1000;
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay playsinline muted></video>

    <div id="status" class="status">Connecting...</div>
    <div id="layoutIndicator" class="layout-indicator">EN</div>

    <div class="channel-status">
      <div>Control: <span id="controlStatus">Disconnected</span></div>
      <div>Binary: <span id="binaryStatus">Disconnected</span></div>
      <div>Video: <span id="videoStatus">Waiting</span></div>
    </div>

    <div class="version-info">
      RMM v2.0 - Phase 1 Fixed<br />
      Object-fit Aware
    </div>

    <div class="controls">
      <button id="screenshotBtn" class="btn" disabled>Screenshot (F9)</button>
      <button id="debugBtn" class="btn">Debug</button>
    </div>

    <!-- Debug Info -->
    <div id="debugInfo" class="debug-info" style="display: none">
      <div><strong>PHASE 1 DEBUG - FIXED</strong></div>
      <hr style="margin: 3px 0; border-color: #333" />
      <div>Video Native: <span id="debugVideoSize">-</span></div>
      <div>Element Size: <span id="debugElementSize">-</span></div>
      <div>Draw Area: <span id="debugDrawArea">-</span></div>
      <div>Offset: <span id="debugOffset">-</span></div>
      <div>Mouse Local: <span id="debugMouseCoords">-</span></div>
      <div>Mouse in Draw: <span id="debugMouseInDraw">-</span></div>
      <div>Mouse Remote: <span id="debugRemoteCoords">-</span></div>
      <div>Scale Factor: <span id="debugScaleFactor">-</span></div>
      <div>Last Update: <span id="debugLastUpdate">-</span></div>
    </div>

    <!-- Screenshot Modal -->
    <div id="screenshotModal" class="screenshot-modal">
      <button class="close-btn" onclick="closeScreenshot()">Close (ESC)</button>
      <img id="screenshotImg" class="screenshot-content" />
    </div>

    <script>
      // === RMM VIEWER v2.0 - PHASE 1: FIXED COORDINATE SYSTEM ===
      console.log(
        "🚀 RMM Viewer v2.0 - Phase 1: Fixed Coordinates with object-fit support",
      );

      // WebRTC и WebSocket variables
      let pc, ws;
      let controlChannel, binaryChannel;

      // PHASE 1: Single source of truth для coordinates
      let videoNativeWidth = 0; // video.videoWidth - ЕДИНСТВЕННЫЙ источник ширины
      let videoNativeHeight = 0; // video.videoHeight - ЕДИНСТВЕННЫЙ источник высоты

      let lastMouseMove = 0;
      const mouseMoveThrottle = 16; // ~60fps
      let currentLayout = "en";
      let screenshotCounter = 0;

      // DOM elements
      const statusEl = document.getElementById("status");
      const controlStatusEl = document.getElementById("controlStatus");
      const binaryStatusEl = document.getElementById("binaryStatus");
      const videoStatusEl = document.getElementById("videoStatus");
      const layoutIndicator = document.getElementById("layoutIndicator");
      const video = document.getElementById("video");
      const screenshotBtn = document.getElementById("screenshotBtn");
      const screenshotModal = document.getElementById("screenshotModal");
      const screenshotImg = document.getElementById("screenshotImg");

      // Debug elements
      const debugInfo = document.getElementById("debugInfo");
      const debugVideoSize = document.getElementById("debugVideoSize");
      const debugElementSize = document.getElementById("debugElementSize");
      const debugDrawArea = document.getElementById("debugDrawArea");
      const debugOffset = document.getElementById("debugOffset");
      const debugMouseCoords = document.getElementById("debugMouseCoords");
      const debugMouseInDraw = document.getElementById("debugMouseInDraw");
      const debugRemoteCoords = document.getElementById("debugRemoteCoords");
      const debugScaleFactor = document.getElementById("debugScaleFactor");
      const debugLastUpdate = document.getElementById("debugLastUpdate");

      // Cyrillic to Latin mapping for Russian layout
      const cyrillicToLatinMap = {
        й: "q",
        ц: "w",
        у: "e",
        к: "r",
        е: "t",
        н: "y",
        г: "u",
        ш: "i",
        щ: "o",
        з: "p",
        х: "[",
        ъ: "]",
        ф: "a",
        ы: "s",
        в: "d",
        а: "f",
        п: "g",
        р: "h",
        о: "j",
        л: "k",
        д: "l",
        ж: ";",
        э: "'",
        я: "z",
        ч: "x",
        с: "c",
        м: "v",
        и: "b",
        т: "n",
        ь: "m",
        б: ",",
        ю: ".",
        "/": "/",
        ё: "`",
        Ё: "~",
      };

      // Prevent context menu
      document.addEventListener("contextmenu", (e) => e.preventDefault());

      // === HELPER FUNCTIONS ===
      function setStatus(msg, color = "#0f0") {
        statusEl.textContent = msg;
        statusEl.style.color = color;
        console.log(`[STATUS] ${msg}`);
      }

      function setChannelStatus(channel, status, color = "#0f0") {
        const el =
          channel === "control"
            ? controlStatusEl
            : channel === "binary"
              ? binaryStatusEl
              : videoStatusEl;
        el.textContent = status;
        el.style.color = color;
      }

      function updateLayoutIndicator() {
        layoutIndicator.textContent = currentLayout === "ru" ? "RU" : "EN";
      }

      function updateDebugInfo(coords = {}) {
        if (debugInfo.style.display === "block") {
          const rect = video.getBoundingClientRect();

          debugVideoSize.textContent = `${videoNativeWidth}x${videoNativeHeight}`;
          debugElementSize.textContent = `${Math.round(rect.width)}x${Math.round(rect.height)}`;

          if (coords.drawWidth && coords.drawHeight) {
            debugDrawArea.textContent = `${Math.round(coords.drawWidth)}x${Math.round(coords.drawHeight)}`;
          }

          if (coords.offsetX !== undefined && coords.offsetY !== undefined) {
            debugOffset.textContent = `${Math.round(coords.offsetX)},${Math.round(coords.offsetY)}`;
          }

          if (coords.mouseX !== undefined && coords.mouseY !== undefined) {
            debugMouseCoords.textContent = `${Math.round(coords.mouseX)},${Math.round(coords.mouseY)}`;
          }

          if (coords.xInVideo !== undefined && coords.yInVideo !== undefined) {
            debugMouseInDraw.textContent = `${Math.round(coords.xInVideo)},${Math.round(coords.yInVideo)}`;
          }

          if (coords.remoteX !== undefined && coords.remoteY !== undefined) {
            debugRemoteCoords.textContent = `${coords.remoteX},${coords.remoteY}`;
          }

          if (videoNativeWidth && rect.width && coords.drawWidth) {
            const scaleX = videoNativeWidth / coords.drawWidth;
            const scaleY = videoNativeHeight / coords.drawHeight;
            debugScaleFactor.textContent = `${scaleX.toFixed(3)}x${scaleY.toFixed(3)}`;
          }

          debugLastUpdate.textContent = new Date().toLocaleTimeString();
        }
      }

      // === PHASE 1: FIXED COORDINATE MAPPING with object-fit: contain support ===
      function mapPointerToRemote(clientX, clientY) {
        // Check if video native dimensions are available
        if (!videoNativeWidth || !videoNativeHeight) {
          console.warn("[COORDS] Video native dimensions not available");
          return null;
        }

        const rect = video.getBoundingClientRect();

        // Get coordinates relative to video element
        const mouseX = clientX - rect.left;
        const mouseY = clientY - rect.top;

        // Check element boundaries
        if (
          mouseX < 0 ||
          mouseX > rect.width ||
          mouseY < 0 ||
          mouseY > rect.height
        ) {
          return null;
        }

        // FIXED: Calculate object-fit: contain dimensions and offsets
        const videoNativeRatio = videoNativeWidth / videoNativeHeight;
        const elementRatio = rect.width / rect.height;

        let drawWidth,
          drawHeight,
          offsetX = 0,
          offsetY = 0;

        if (elementRatio > videoNativeRatio) {
          // Element is wider than video - letterboxing with vertical bars
          drawHeight = rect.height;
          drawWidth = drawHeight * videoNativeRatio;
          offsetX = (rect.width - drawWidth) / 2;
          offsetY = 0;
        } else {
          // Element is taller than video - letterboxing with horizontal bars
          drawWidth = rect.width;
          drawHeight = drawWidth / videoNativeRatio;
          offsetX = 0;
          offsetY = (rect.height - drawHeight) / 2;
        }

        // Calculate mouse position within the actual video draw area
        const xInVideo = mouseX - offsetX;
        const yInVideo = mouseY - offsetY;

        // Check if mouse is within the video draw area
        if (
          xInVideo < 0 ||
          xInVideo > drawWidth ||
          yInVideo < 0 ||
          yInVideo > drawHeight
        ) {
          console.log(
            `[COORDS] Mouse outside video draw area: ${Math.round(xInVideo)},${Math.round(yInVideo)} vs ${Math.round(drawWidth)}x${Math.round(drawHeight)}`,
          );
          return null;
        }

        // PHASE 1: Map to remote coordinates
        const remoteX = Math.round((xInVideo / drawWidth) * videoNativeWidth);
        const remoteY = Math.round((yInVideo / drawHeight) * videoNativeHeight);

        // Clamp coordinates to valid range
        const clampedX = Math.max(0, Math.min(videoNativeWidth - 1, remoteX));
        const clampedY = Math.max(0, Math.min(videoNativeHeight - 1, remoteY));

        // Update debug info with all calculated values
        updateDebugInfo({
          drawWidth,
          drawHeight,
          offsetX,
          offsetY,
          mouseX,
          mouseY,
          xInVideo,
          yInVideo,
          remoteX: clampedX,
          remoteY: clampedY,
        });

        console.log(
          `[COORDS] Element: ${Math.round(mouseX)},${Math.round(mouseY)} → Draw: ${Math.round(xInVideo)},${Math.round(yInVideo)} → Remote: ${clampedX},${clampedY}`,
        );

        return { x: clampedX, y: clampedY };
      }

      // === COMMUNICATION FUNCTIONS ===
      function sendControl(type, payload = {}) {
        if (controlChannel && controlChannel.readyState === "open") {
          try {
            const message = { type, ...payload };
            controlChannel.send(JSON.stringify(message));
            console.log(`[CONTROL] Sent: ${type}`, payload);
          } catch (e) {
            console.error("[CONTROL] Failed to send message:", e);
          }
        } else {
          console.warn(`[CONTROL] Channel not ready for ${type}`);
        }
      }

      function sendBinary(messageType, payload = new Uint8Array()) {
        if (binaryChannel && binaryChannel.readyState === "open") {
          try {
            const typeBytes = new TextEncoder().encode(
              messageType.padEnd(4).slice(0, 4),
            );
            const message = new Uint8Array(typeBytes.length + payload.length);
            message.set(typeBytes, 0);
            message.set(payload, typeBytes.length);
            binaryChannel.send(message);
            console.log(
              `[BINARY] Sent: ${messageType}, ${payload.length} bytes`,
            );
          } catch (e) {
            console.error("[BINARY] Failed to send message:", e);
          }
        } else {
          console.warn(`[BINARY] Channel not ready for ${messageType}`);
        }
      }

      // === VIDEO DIMENSION SYNCHRONIZATION ===
      function syncVideoDimensions() {
        if (video.videoWidth && video.videoHeight) {
          const newWidth = video.videoWidth;
          const newHeight = video.videoHeight;

          if (
            videoNativeWidth !== newWidth ||
            videoNativeHeight !== newHeight
          ) {
            const prevWidth = videoNativeWidth;
            const prevHeight = videoNativeHeight;

            videoNativeWidth = newWidth;
            videoNativeHeight = newHeight;

            console.log(
              `[VIDEO] Native dimensions updated: ${prevWidth}x${prevHeight} → ${videoNativeWidth}x${videoNativeHeight}`,
            );
            updateDebugInfo();

            // Send confirmation to Go agent
            sendControl("video_dimensions_confirmed", {
              width: videoNativeWidth,
              height: videoNativeHeight,
            });
          }
        }
      }

      // Video dimension monitoring
      video.addEventListener("loadedmetadata", () => {
        console.log("[VIDEO] Metadata loaded");
        syncVideoDimensions();
      });

      video.addEventListener("resize", () => {
        console.log("[VIDEO] Video resized");
        syncVideoDimensions();
      });

      // Monitor video element size changes
      new ResizeObserver(() => {
        updateDebugInfo();
      }).observe(video);

      // === MOUSE EVENT HANDLERS ===
      video.addEventListener("mousemove", (e) => {
        const now = Date.now();
        if (now - lastMouseMove < mouseMoveThrottle) return;
        lastMouseMove = now;

        const mapped = mapPointerToRemote(e.clientX, e.clientY);
        if (mapped) {
          sendControl("mouse_move", mapped);
        }
      });

      // Mouse click events
      ["mousedown", "mouseup"].forEach((evt) =>
        video.addEventListener(evt, (e) => {
          const mapped = mapPointerToRemote(e.clientX, e.clientY);
          if (mapped) {
            sendControl(evt === "mousedown" ? "mouse_down" : "mouse_up", {
              button: e.button,
              x: mapped.x,
              y: mapped.y,
            });
          }
          e.preventDefault();
        }),
      );

      // === KEYBOARD EVENT HANDLERS ===
      function isPrintableKey(e) {
        return (
          e.key.length === 1 &&
          !e.ctrlKey &&
          !e.altKey &&
          !e.metaKey &&
          e.key !== " "
        );
      }

      function mapKeyEventToRobotKey(e) {
        const tagName = e.target.tagName;
        if (
          tagName === "INPUT" ||
          tagName === "TEXTAREA" ||
          e.target.isContentEditable
        ) {
          return null;
        }

        if (e.code === "Space") return "space";

        const keyMap = {
          Enter: "enter",
          Backspace: "backspace",
          Tab: "tab",
          Escape: "esc",
          Delete: "delete",
          Insert: "insert",
          Home: "home",
          End: "end",
          PageUp: "pageup",
          PageDown: "pagedown",
          ArrowLeft: "left",
          ArrowRight: "right",
          ArrowUp: "up",
          ArrowDown: "down",
          ControlLeft: "ctrl",
          ControlRight: "ctrl",
          ShiftLeft: "shift",
          ShiftRight: "shift",
          AltLeft: "alt",
          AltRight: "alt",
          F1: "f1",
          F2: "f2",
          F3: "f3",
          F4: "f4",
          F5: "f5",
          F6: "f6",
          F7: "f7",
          F8: "f8",
          F9: "f9",
          F10: "f10",
          F11: "f11",
          F12: "f12",
          BracketLeft: "[",
          BracketRight: "]",
          Semicolon: ";",
          Quote: "'",
          Comma: ",",
          Period: ".",
          Slash: "/",
          Backslash: "\\",
          Equal: "=",
          Minus: "-",
          Backquote: "`",
        };

        return keyMap[e.code] || null;
      }

      window.addEventListener("keydown", (e) => {
        if (!controlChannel || controlChannel.readyState !== "open") return;

        // F9 for screenshot
        if (e.key === "F9") {
          e.preventDefault();
          requestScreenshot();
          return;
        }

        // ESC to close screenshot
        if (e.key === "Escape" && screenshotModal.style.display === "flex") {
          closeScreenshot();
          e.preventDefault();
          return;
        }

        // Handle printable keys
        if (isPrintableKey(e) && e.key.length === 1) {
          let latKey = e.key;
          if (/[а-яёА-ЯЁ]/.test(latKey)) {
            latKey = cyrillicToLatinMap[latKey.toLowerCase()] || latKey;
          }
          sendControl("key_down", { key: latKey });
          e.preventDefault();
          return;
        }

        // Handle special keys
        const robotKey = mapKeyEventToRobotKey(e);
        if (robotKey) {
          e.preventDefault();
          sendControl("key_down", { key: robotKey });
        } else {
          e.preventDefault();
        }
      });

      window.addEventListener("keyup", (e) => {
        if (!controlChannel || controlChannel.readyState !== "open") return;

        if (
          isPrintableKey(e) &&
          e.key.length === 1 &&
          /[а-яёА-ЯЁ]/.test(e.key)
        ) {
          const latKey = cyrillicToLatinMap[e.key.toLowerCase()] || e.key;
          sendControl("key_up", { key: latKey });
          e.preventDefault();
          return;
        }

        const robotKey = mapKeyEventToRobotKey(e);
        if (robotKey) {
          e.preventDefault();
          sendControl("key_up", { key: robotKey });
        } else {
          e.preventDefault();
        }
      });

      // Layout switching (Ctrl+Shift)
      window.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.shiftKey && !e.altKey && !e.metaKey) {
          currentLayout = currentLayout === "ru" ? "en" : "ru";
          updateLayoutIndicator();
          console.log(`[KEYBOARD] Layout switched to: ${currentLayout}`);
          e.preventDefault();
        }
      });

      // === WebRTC CONNECTION SETUP ===
      async function connect() {
        const addr =
          "ws://" + window.location.hostname + ":8000/ws/viewer/agent1";
        console.log(`[WS] Connecting to: ${addr}`);

        ws = new WebSocket(addr);

        ws.onopen = async () => {
          console.log("[WS] Connected successfully");
          setStatus("Connected");

          // Clean up old peer connection
          if (pc) {
            pc.close();
          }

          // Create new WebRTC peer connection
          pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
          });

          // Create data channels
          controlChannel = pc.createDataChannel("control", { ordered: true });
          binaryChannel = pc.createDataChannel("binary", { ordered: true });

          setupControlChannel(controlChannel);
          setupBinaryChannel(binaryChannel);
          setupPeerConnection(pc);

          try {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify(offer));
            console.log("[WebRTC] SDP offer sent");
          } catch (err) {
            console.error("[WebRTC] Error creating offer:", err);
            setStatus("WebRTC Error", "#f00");
            pc.close();
            ws.close();
          }
        };

        // FIXED: Handle both text and binary messages properly
        ws.onmessage = async (e) => {
          try {
            // Check if it's a text message (should be JSON for WebRTC signaling)
            if (typeof e.data === "string") {
              const data = JSON.parse(e.data);
              if (data.type === "answer") {
                await pc.setRemoteDescription(data);
                console.log("[WebRTC] SDP answer received");
              } else if (data.candidate) {
                await pc.addIceCandidate(data);
                console.log("[WebRTC] ICE candidate received");
              } else {
                console.log("[WS] Unknown message type:", data.type);
              }
            } else {
              // Binary message (should not happen in signaling, but handle gracefully)
              console.log(
                "[WS] Received binary message, ignoring for signaling",
              );
            }
          } catch (err) {
            console.error("[WS] Error handling message:", err);
          }
        };

        ws.onclose = () => {
          console.warn("[WS] Disconnected, retrying in 2 seconds...");
          setStatus("Reconnecting...", "#f90");
          setChannelStatus("control", "Disconnected", "#f90");
          setChannelStatus("binary", "Disconnected", "#f90");
          setChannelStatus("video", "Disconnected", "#f90");
          if (pc) pc.close();
          setTimeout(connect, 2000);
        };

        ws.onerror = (err) => {
          console.error("[WS] Error:", err);
          setStatus("WS Error", "#f00");
        };
      }

      // === DATA CHANNEL SETUP ===
      function setupControlChannel(channel) {
        channel.onopen = () => {
          console.log("[CONTROL] DataChannel opened");
          setStatus("Control Ready");
          setChannelStatus("control", "Connected", "#0f0");
          screenshotBtn.disabled = false;

          // Request initial video info
          sendControl("request_video_info");
        };

        channel.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            handleControlMessage(data);
          } catch (err) {
            console.warn("[CONTROL] Failed to parse message:", err, e.data);
          }
        };

        channel.onclose = () => {
          console.log("[CONTROL] DataChannel closed");
          setChannelStatus("control", "Disconnected", "#f66");
          screenshotBtn.disabled = true;
        };

        channel.onerror = (err) => {
          console.error("[CONTROL] DataChannel error:", err);
        };
      }

      function setupBinaryChannel(channel) {
        channel.binaryType = "arraybuffer";

        channel.onopen = () => {
          console.log("[BINARY] DataChannel opened");
          setChannelStatus("binary", "Connected", "#0f0");
        };

        channel.onmessage = (e) => {
          handleBinaryMessage(e.data);
        };

        channel.onclose = () => {
          console.log("[BINARY] DataChannel closed");
          setChannelStatus("binary", "Disconnected", "#f66");
        };

        channel.onerror = (err) => {
          console.error("[BINARY] DataChannel error:", err);
        };
      }

      function setupPeerConnection(pcInstance) {
        pcInstance.ontrack = (e) => {
          if (video.srcObject !== e.streams[0]) {
            video.srcObject = e.streams[0];
            setChannelStatus("video", "Streaming", "#0f0");
            console.log("[WebRTC] Video stream received");

            // Trigger video dimension sync when stream starts
            setTimeout(syncVideoDimensions, 1000);
          }
        };

        pcInstance.onicecandidate = (e) => {
          if (e.candidate) {
            ws.send(JSON.stringify(e.candidate));
          }
        };

        pcInstance.onconnectionstatechange = () => {
          const state = pcInstance.connectionState;
          console.log(`[WebRTC] Connection state: ${state}`);

          if (state === "connected") {
            setStatus("Full Connected", "#0f0");
          } else if (state === "failed" || state === "closed") {
            setStatus("Connection Lost", "#f00");
            setChannelStatus("video", "Disconnected", "#f00");
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.close();
            }
          } else if (state === "connecting") {
            setStatus("Connecting...", "#ff0");
          }
        };

        // Only receive video, no audio
        pcInstance.addTransceiver("video", { direction: "recvonly" });
      }

      // === MESSAGE HANDLING ===
      function handleControlMessage(data) {
        console.log("[CONTROL] Received:", data);

        switch (data.type) {
          case "video_info":
            if (data.width && data.height) {
              console.log(
                `[CONTROL] Server video info: ${data.width}x${data.height}`,
              );

              // Compare with local video dimensions
              if (videoNativeWidth && videoNativeHeight) {
                if (
                  videoNativeWidth !== data.width ||
                  videoNativeHeight !== data.height
                ) {
                  console.warn(
                    `[CONTROL] Video size mismatch! Local: ${videoNativeWidth}x${videoNativeHeight}, Server: ${data.width}x${data.height}`,
                  );
                } else {
                  console.log("[CONTROL] Video dimensions confirmed matching");
                }
              }
            }
            break;

          case "pong":
            console.log("[CONTROL] Pong received");
            break;

          default:
            console.log("[CONTROL] Unknown message type:", data.type);
        }
      }

      function handleBinaryMessage(arrayBuffer) {
        const data = new Uint8Array(arrayBuffer);
        if (data.length < 4) {
          console.warn("[BINARY] Message too short:", data.length);
          return;
        }

        const msgType = String.fromCharCode(...data.slice(0, 4));
        const payload = data.slice(4);

        console.log(
          `[BINARY] Received: ${msgType.trim()}, ${payload.length} bytes`,
        );

        switch (msgType.trim()) {
          case "SCRN":
            handleScreenshotData(payload);
            break;
          default:
            console.log("[BINARY] Unknown message type:", msgType);
        }
      }

      function handleScreenshotData(data) {
        screenshotCounter++;
        console.log(
          `[SCREENSHOT] #${screenshotCounter} received: ${data.length} bytes`,
        );

        const blob = new Blob([data], { type: "image/png" });
        const url = URL.createObjectURL(blob);

        screenshotImg.src = url;
        screenshotModal.style.display = "flex";

        // Cleanup URL after 30 seconds
        setTimeout(() => URL.revokeObjectURL(url), 30000);
      }

      // === UI FUNCTIONS ===
      function requestScreenshot() {
        if (!binaryChannel || binaryChannel.readyState !== "open") {
          console.warn("[SCREENSHOT] Binary channel not available");
          return;
        }

        console.log("[SCREENSHOT] Requesting...");
        sendBinary("SCRN", new TextEncoder().encode("REQUEST"));
      }

      function closeScreenshot() {
        screenshotModal.style.display = "none";
        if (screenshotImg.src && screenshotImg.src.startsWith("blob:")) {
          URL.revokeObjectURL(screenshotImg.src);
          screenshotImg.src = "";
        }
      }

      function toggleDebug() {
        const isVisible = debugInfo.style.display !== "none";
        debugInfo.style.display = isVisible ? "none" : "block";
        console.log(`[DEBUG] Panel ${isVisible ? "hidden" : "shown"}`);

        if (!isVisible) {
          updateDebugInfo();
        }
      }

      // === EVENT LISTENERS ===
      screenshotBtn.addEventListener("click", requestScreenshot);
      document
        .getElementById("debugBtn")
        .addEventListener("click", toggleDebug);

      screenshotModal.addEventListener("click", (e) => {
        if (e.target === screenshotModal) {
          closeScreenshot();
        }
      });

      // === INITIALIZATION ===
      console.log("[INIT] Starting RMM Viewer v2.0 - Phase 1 Fixed");
      updateLayoutIndicator();
      connect();

      // Periodic ping to keep connection alive
      setInterval(() => {
        if (controlChannel && controlChannel.readyState === "open") {
          sendControl("ping");
        }
      }, 30000);
    </script>
  </body>
</html>
